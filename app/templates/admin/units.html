{% extends 'base.html' %}

{% block title %}Manage Units - Admin{% endblock %}

{% block content %}
<div class="level mb-5">
    <div class="level-left">
        <div class="level-item">
            <h1 class="title is-2">📏 Manage Units</h1>
        </div>
    </div>
    <div class="level-right">
        <div class="level-item">
            <a href="{{ url_for('admin.index') }}" class="button is-light">
                <span class="icon">⬅️</span>
                <span>Back to Admin</span>
            </a>
        </div>
    </div>
</div>

<div class="box mb-5">
    <h2 class="title is-4">➕ Add New Unit</h2>
    <form method="post" action="{{ url_for('admin.add_unit') }}">
        <div class="columns">
            <div class="column is-8">
                <div class="field">
                    <label class="label" for="name">Unit Name</label>
                    <div class="control">
                        <input class="input" type="text" name="name" id="name" placeholder="e.g., Tablespoon" required>
                    </div>
                </div>
            </div>
            <div class="column is-3">
                <div class="field">
                    <label class="label" for="abbreviation">Abbreviation</label>
                    <div class="control">
                        <input class="input" type="text" name="abbreviation" id="abbreviation" placeholder="e.g., tbsp">
                    </div>
                </div>
            </div>
            <div class="column is-1 is-flex is-align-items-end">
                <div class="field">
                    <div class="control">
                        <button type="submit" class="button is-primary">
                            <span class="icon">➕</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>

<div class="box">
    <h2 class="title is-4">📋 Existing Units</h2>
    <div class="table-container">
        <table class="table is-fullwidth is-striped is-hoverable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Abbreviation</th>
                </tr>
            </thead>
            <tbody>
            {% for unit in units %}
                <tr>
                    <td><strong>{{ unit.name }}</strong></td>
                    <td><code>{{ unit.abbreviation }}</code></td>
                </tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
