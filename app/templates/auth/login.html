{% extends 'base.html' %}

{% block title %}Login - Open Kitchen{% endblock %}

{% block content %}
<div class="columns is-centered mt-6">
    <div class="column is-5-tablet is-4-desktop is-3-widescreen">
        <div class="box">
            <h2 class="title is-3 has-text-centered mb-5">🔑 Login</h2>
            <form method="post">
                <div class="field">
                    <label class="label" for="username">Username</label>
                    <div class="control has-icons-left">
                        <input class="input" type="text" name="username" id="username" placeholder="Enter your username" required>
                        <span class="icon is-small is-left">
                            <i class="fas fa-user"></i>
                        </span>
                    </div>
                </div>
                <div class="field">
                    <label class="label" for="password">Password</label>
                    <div class="control has-icons-left">
                        <input class="input" type="password" name="password" id="password" placeholder="Enter your password" required>
                        <span class="icon is-small is-left">
                            <i class="fas fa-lock"></i>
                        </span>
                    </div>
                </div>
                <div class="field">
                    <div class="control">
                        <button type="submit" class="button is-primary is-fullwidth">Login</button>
                    </div>
                </div>
            </form>
            <div class="has-text-centered mt-4">
                <p>Don't have an account? <a href="{{ url_for('auth.register') }}">Register here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
